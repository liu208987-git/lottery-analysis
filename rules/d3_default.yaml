# 福彩3D默认规则配置
# 排列三和福彩3D规则基本相同，但和值/跨度分布略有差异
name: "福彩3D默认规则"
version: "1.0"

filters:
  # 和值范围：福彩3D约90%开奖落在8-20
  sum_range:
    enabled: true
    lo: 8
    hi: 20

  span_range:
    enabled: true
    lo: 3
    hi: 8

  odd_even:
    enabled: true
    max_odd: 2
    max_even: 2

  big_small:
    enabled: true
    max_big: 2
    max_small: 2

  route_distribution:
    enabled: true
    max_single_route: 2

  morphology:
    enabled: true
    allowed_morphologies:
      - "组三"
      - "组六"

  hot_cold:
    enabled: true
    max_cold: 1
    max_hot: 3

  exclude_recent:
    enabled: true
    exclude_n: 5

  consecutive:
    enabled: true
    max_consecutive: 2
