# 评分权重配置
# 各维度权重总和 = 100
weights:
  和值: 18
  跨度: 15
  形态: 12
  奇偶: 8
  大小: 8
  012路: 7
  冷热: 10    # 提高冷热权重，重视冷号
  遗漏: 7     # 提高遗漏权重
  组三六偏向: 8
  多样性: 10  # 新增：组选多样性 + 跨度多样性

# 冷热参数
hot_cold:
  cold_threshold: 6    # 遗漏>6视为冷号（原来8）
  hot_threshold: 3     # 遗漏<=3视为热号

# 多样性参数
diversity:
  group_penalty: 5     # 同组选重复扣分
  span_spread: 8       # 跨度多样性加分

# 过热衰减
overheat_decay:
  high: 0.6    # 近5期出现≥3次
  medium: 0.8  # 近5期出现≥2次
