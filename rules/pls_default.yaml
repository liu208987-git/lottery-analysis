# 排列三默认规则配置
# 根据回测结果调整参数
name: "排列三默认规则"
version: "1.0"

filters:
  # 和值范围：约90%开奖落在8-20
  sum_range:
    enabled: true
    lo: 8
    hi: 20

  # 跨度范围：约85%开奖落在3-8
  span_range:
    enabled: true
    lo: 3
    hi: 8

  # 奇偶限制：排除全奇和全偶（各占约8%）
  odd_even:
    enabled: true
    max_odd: 2
    max_even: 2

  # 大小限制：排除全大和全小
  big_small:
    enabled: true
    max_big: 2
    max_small: 2

  # 012路分布：排除三路全同（如000路）
  route_distribution:
    enabled: true
    max_single_route: 2

  # 形态过滤：豹子罕见(<1%)，注数/奖金性价比低
  morphology:
    enabled: true
    allowed_morphologies:
      - "组三"
      - "组六"

  # 冷热号：最多允许1个冷号(遗漏>8)
  hot_cold:
    enabled: true
    max_cold: 1
    max_hot: 3

  # 排除近5期已出号码
  exclude_recent:
    enabled: true
    exclude_n: 5

  # 连号限制：最多2组连号
  consecutive:
    enabled: true
    max_consecutive: 2

# 评分权重（可选）
score_weights:
  sum_avg: 5
  span: 3
  odd_even: 3
  big_small: 3
  route_balance: 3
