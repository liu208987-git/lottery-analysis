# 数据源配置 v2.1
# 每类彩种 primary + backup/verify 源，按 priority 排序
# circuit_breaker: 连续失败 N 次后冷却 M 分钟（指数递增）

pls:
  primary:
    - name: js_lottery
      url: "https://www.js-lottery.com/wfzq/p3p5/p3data"
      type: html_table
      enabled: true
      priority: 1
      trust_level: high
      timeout: 20

  backup:
    - name: sporttery_api
      url: "https://webapi.sporttery.cn/gateway/lottery/getHistoryPageListV1.qry?gameNo=350133&provinceId=0&pageSize={page_size}&is498=1"
      type: json_api
      enabled: true
      priority: 2
      trust_level: official_but_rate_limited
      page_size: 5
      timeout: 15
      circuit_breaker:
        max_consecutive_failures: 2
        cooldown_minutes: 120

d3:
  primary:
    - name: eastmoney
      url: "https://caipiao.eastmoney.com/Result/History/fc3d?page={page}"
      type: html_scrape
      enabled: true
      priority: 1
      trust_level: high
      max_pages: 2
      timeout: 20

  verify:
    - name: zhcw
      url: "http://kaijiang.zhcw.com/zhcw/html/3d/list_{page}.html"
      type: html_table
      enabled: true
      priority: 2
      trust_level: medium_prone_to_stale_cache
      max_pages: 3
      timeout: 15
      circuit_breaker:
        max_consecutive_failures: 2
        cooldown_minutes: 60
