name: Daily Review

on:
  schedule:
    - cron: "0 14 * * *"     # 北京时间 22:00
  workflow_dispatch:           # 手动触发

permissions:
  contents: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest draw results
        run: python scripts/data_fetcher.py --all

      - name: Update feature engineering
        run: |
          python scripts/feature_engine.py --input data/raw/pls_raw.csv --output data/processed/pls_feat.csv --lottery pls --force
          python scripts/feature_engine.py --input data/raw/d3_raw.csv --output data/processed/d3_feat.csv --lottery d3 --force

      - name: Compare predictions with results
        run: |
          python scripts/compare_result.py --lottery pls --strategy default || echo "pls default compare skipped"
          python scripts/compare_result.py --lottery d3 --strategy default || echo "d3 default compare skipped"
          python scripts/compare_result.py --lottery pls --strategy conservative || echo "pls conservative compare skipped"
          python scripts/compare_result.py --lottery d3 --strategy conservative || echo "d3 conservative compare skipped"
          python scripts/compare_result.py --lottery pls --strategy diversity || echo "pls diversity compare skipped"
          python scripts/compare_result.py --lottery d3 --strategy diversity || echo "d3 diversity compare skipped"

      - name: Generate review summary
        run: python scripts/review_summary.py || echo "review summary skipped"

      - name: Commit review outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/raw/ data/processed/ output/reports/ output/reviews/ || true
          git commit -m "每日复盘 $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M')" || echo "No changes to commit"
          git push || echo "Push failed (may be up-to-date)"
