name: Daily Predict

on:
  schedule:
    - cron: "30 9 * * *"    # 北京时间 17:30
  workflow_dispatch:          # 手动触发

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest data
        run: python scripts/data_fetcher.py --all

      - name: Run feature engineering
        run: |
          python scripts/feature_engine.py --input data/raw/pls_raw.csv --output data/processed/pls_feat.csv --lottery pls --force
          python scripts/feature_engine.py --input data/raw/d3_raw.csv --output data/processed/d3_feat.csv --lottery d3 --force

      - name: Run statistics
        run: |
          python scripts/stats_engine.py --lottery pls
          python scripts/stats_engine.py --lottery d3

      - name: Run multi-strategy scoring
        run: python run_daily.py --strategy all --top-k 30

      - name: Commit prediction outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/raw/ data/processed/ data/cache/ output/predictions/ output/reports/ output/charts/ || true
          git commit -m "每日预测 $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M')" || echo "No changes to commit"
          git push || echo "Push failed (may be up-to-date)"
